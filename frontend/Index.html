<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:#0f0f0f;
      color:white;
      font-family:Arial;
    }

    .card{
      background:#1e1e1e;
      padding:30px 40px;
      border-radius:15px;
      text-align:center;
    }

    a{
      display:inline-block;
      margin-top:15px;
      padding:15px 25px;
      background:#2d2d2d;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }

    a:hover{
      background:#444;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Game Hub</h1>

  <a href="minecraft/index.html">
    Jogar Minecraft
  </a>

</div>

</body>
</html>
